name: Build program PDF

on:
  workflow_dispatch:
    inputs:
      json_file:
        description: JSON file used to build the program
        required: true
        type: choice
        options:
          - abstract_2025.json
          - abstract_2026.json
      chair:
        description: Use chair_2025.json
        required: true
        type: choice
        options:
          - use
          - do-not-use

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install fonts and browser libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fonts-noto-cjk \
            fonts-urw-base35 \
            libgbm1
          fc-cache -f -v

      - name: Check installed fonts
        run: |
          fc-match "Noto Sans CJK JP"
          fc-match "Nimbus Roman"

      - name: Generate HTML and CSS
        env:
          INPUT_JSON: ${{ inputs.json_file }}
          USE_CHAIR: ${{ inputs.chair }}
        run: |
          if [ "$USE_CHAIR" = "use" ]; then
            python3 build_program.py --input "$INPUT_JSON" --chair chair_2025.json
          else
            python3 build_program.py --input "$INPUT_JSON"
          fi
          python3 build_author_index.py --input "$INPUT_JSON"

      - name: Build PDF
        run: npx --yes @vivliostyle/cli@11.1.0 build

      - name: Upload PDF
        uses: actions/upload-artifact@v7
        with:
          name: pasj-pdfs
          path: |
            dist/program.pdf
            dist/author_index.pdf
          if-no-files-found: error
