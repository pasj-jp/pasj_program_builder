name: Build program PDF

on:
  push:
    branches:
      - main
    paths:
      - abstract.json
      - program_overrides.json
      - build_program.py
      - build_author_index.py
      - vivliostyle.config.js
      - .github/workflows/build-pdf.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install fonts and browser libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fonts-noto-cjk \
            fonts-urw-base35 \
            libgbm1
          fc-cache -f -v

      - name: Check installed fonts
        run: |
          fc-match "Noto Sans CJK JP"
          fc-match "Nimbus Roman"

      - name: Generate HTML and CSS
        run: |
          python3 build_program.py
          python3 build_author_index.py

      - name: Build PDF
        run: npx --yes @vivliostyle/cli@11.1.0 build

      - name: Upload PDF
        uses: actions/upload-artifact@v7
        with:
          name: pasj-pdfs
          path: |
            dist/program.pdf
            dist/author_index.pdf
          if-no-files-found: error
